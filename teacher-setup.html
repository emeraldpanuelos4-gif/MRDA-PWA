<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Setup</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0a1fb0,#1e3cff);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:10px;
}
.container{
  background:white;
  width:80%;
  max-width:400px;
  padding:25px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
}
.logo{
  width:150px;
  margin-bottom:-10px;
}
input,select,textarea{
  width:90%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  width:90%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#1e3cff;
  color:white;
}
</style>
</head>
<body>

<div class="container">
  <img src="logo.png" class="logo">
<h2>Teacher Profile Setup</h2>

<input id="firstName" placeholder="First Name">
<input id="middleName" placeholder="Middle Name">
<input id="lastName" placeholder="Last Name">

<input id="username" placeholder="Username (@mrda.com)">
<input type="password" id="newPassword" placeholder="New Password (8+ chars)">

<textarea id="bio" maxlength="100" placeholder="Bio"></textarea>
<input id="emailInput" placeholder="Public Email">
<input id="contactNumber" placeholder="Contact Number">

<select id="roleSelect">
<option value="subject">Subject Teacher</option>
<option value="adviser">Adviser</option>
</select>

<input id="adviserClass" placeholder="If Adviser: Grade-Section-Strand">

<button id="saveBtn">Sign In</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyAtBlO4Iwj5TMYlvwQeENndd7fcV-lyXl4",
authDomain:"mrda-pwa.firebaseapp.com",
projectId:"mrda-pwa"
});

const auth=firebase.auth();
const db=firebase.firestore();

document.getElementById("saveBtn").addEventListener("click",async()=>{

const user=auth.currentUser;
if(newPassword.value.length<8){
alert("Password must be 8 characters");
return;
}

await user.updatePassword(newPassword.value);
await user.updateEmail(username.value);

await db.collection("users").doc(user.uid).update({
firstName:firstName.value,
middleName:middleName.value,
lastName:lastName.value,
username:username.value,
bio:bio.value,
email:emailInput.value,
contactNumber:contactNumber.value,
teacherRole:roleSelect.value,
adviserClass:adviserClass.value,
profileCompleted:true
});

window.location.href="teacher-home.html";

});
</script>
</body>
</html>
