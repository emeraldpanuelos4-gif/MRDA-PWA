<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRDA AcademeAccess</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3cff">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0a1fb0,#1e3cff);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:10px;
}
.container{
  background:white;
  width:80%;
  max-width:360px;
  padding:30px 25px;
  border-radius:16px;
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
  text-align:center;
}
.logo{
  width:150px;
  margin-bottom:-10px;
}
h2{
  color:#0a1fb0;
  margin-bottom:20px;
}
input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}
input:focus{ border-color:#1e3cff; }
button{
  width:90%;
  padding:12px;
  margin-top:12px;
  border-radius:12px;
  border:none;
  background:#1e3cff;
  color:white;
  font-size:16px;
  cursor:pointer;
}
button:hover{ background:#0a1fb0; }
.footer{
  margin-top:15px;
  font-size:12px;
  color:#777;
}
</style>
</head>
<body>

<div class="container">
  <img src="logo.png" class="logo">
  <h2>MRDA AcademeAccess</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button id="loginBtn">Login</button>

  <div class="footer">© MRDA Academic Center Inc.</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAtBlO4Iwj5TMYlvwQeENndd7fcV-lyXl4",
  authDomain: "mrda-pwa.firebaseapp.com",
  projectId: "mrda-pwa",
  storageBucket: "mrda-pwa.appspot.com",
  messagingSenderId: "59701076462",
  appId: "1:59701076462:web:be714b43e3f04d61c32eff"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    const userCred = await auth.signInWithEmailAndPassword(email,password);
    const user = userCred.user;

    // Reference to the user's Firestore document
    const docRef = db.collection("users").doc(user.uid);
    const doc = await docRef.get();

    // If first login / user document does not exist
    if(!doc.exists){
      // Assign role safely (default to student)
      let role = "student"; 
      // Optional: you can set role based on an admin or verified teacher emails
      if(email.includes("teacher")) role = "teacher";

      await docRef.set({
        role: role,
        profileCompleted: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      // Redirect to respective home page
      window.location.href = role === "student" ? "student-home.html" : "teacher-home.html";
      return;
    }

    const data = doc.data();


  }catch(error){
    alert(error.message);
  }
});
</script>

</body>
</html>
