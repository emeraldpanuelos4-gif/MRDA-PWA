<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Setup</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0a1fb0,#1e3cff);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:10px;
}
.container{
  background:white;
  width:80%;
  max-width:400px;
  padding:25px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
}
.logo{
  width:150px;
  margin-bottom:-10px;
}
input,select,textarea{
  width:90%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
}
textarea{ resize:none; }
button{
  width:90%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#1e3cff;
  color:white;
  font-size:16px;
}
</style>
</head>
<body>

<div class="container">
  <img src="logo.png" class="logo">
<h2>Student Profile Setup</h2>

<input type="file" id="profilePic">

<input id="firstName" placeholder="First Name">
<input id="middleName" placeholder="Middle Name">
<input id="lastName" placeholder="Last Name">
<input id="suffix" placeholder="Suffix">

<input id="username" placeholder="Username (example@mrda.com)">
<input type="password" id="newPassword" placeholder="New Password (8+ chars)">

<select id="grade">
<option value="">Select Grade</option>
<option>Grade 11</option>
<option>Grade 12</option>
</select>

<select id="section">
<option value="">Select Section</option>
<option>Silang</option>
<option>Bonifacio</option>
<option>Rizal</option>
<option>Mabini</option>
</select>

<select id="strand">
<option value="">Select Strand</option>
<option>ABM</option>
<option>GAS</option>
<option>HUMSS</option>
<option>STEM</option>
<option>TVL</option>
</select>

<textarea id="bio" maxlength="100" placeholder="Bio (100 characters max)"></textarea>

<input id="emailInput" placeholder="Public Email">
<input id="contactNumber" placeholder="Contact Number">

<button id="saveBtn">Sign In</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAtBlO4Iwj5TMYlvwQeENndd7fcV-lyXl4",
  authDomain:"mrda-pwa.firebaseapp.com",
  projectId:"mrda-pwa",
  storageBucket:"mrda-pwa.appspot.com"
});

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

document.getElementById("saveBtn").addEventListener("click",async()=>{

const user=auth.currentUser;
const newPass=newPassword.value;

if(newPass.length<8){
alert("Password must be 8 characters.");
return;
}

await user.updatePassword(newPass);
await user.updateEmail(username.value);

let imageUrl="";
const file=profilePic.files[0];

if(file){
const ref=storage.ref("profilePics/"+user.uid);
await ref.put(file);
imageUrl=await ref.getDownloadURL();
}

await db.collection("users").doc(user.uid).update({
profileImage:imageUrl,
firstName:firstName.value,
middleName:middleName.value,
lastName:lastName.value,
suffix:suffix.value,
username:username.value,
grade:grade.value,
section:section.value,
strand:strand.value,
bio:bio.value,
email:emailInput.value,
contactNumber:contactNumber.value,
profileCompleted:true
});

window.location.href="student-home.html";

});
</script>
</body>
</html>
